{% extends "layout.html" %}
{% block title %}Setup Two-Factor Authentication{% endblock %}

{% block body %}
<section class="text-gray-400 bg-gray-900 body-font">
  <div class="container px-5 py-24 mx-auto flex flex-wrap items-center">
    <div class="lg:w-3/5 md:w-1/2 md:pr-16 lg:pr-0 pr-0">
      <h1 class="title-font font-medium text-3xl text-white">
        Set up Two-Factor Authentication
      </h1>
      <p class="leading-relaxed mt-4">
        Scan this QR code with your authenticator app, or enter this secret manually:
        <strong>{{ totp_secret }}</strong>
      </p>
      <div id="qrcode-container" class="mt-4">
        <img id="qrcode" alt="TOTP QR Code">
      </div>
    </div>

    <div class="lg:w-2/6 md:w-1/2 bg-gray-800 bg-opacity-50 rounded-lg p-8 flex flex-col md:ml-auto w-full mt-10 md:mt-0">
      <h2 class="text-white text-lg font-medium title-font mb-5">Enter TOTP Code</h2>
      <form action="/login/totp/setup" method="post">
        <div class="relative mb-4">
          <label for="totp" class="leading-7 text-sm text-gray-400">TOTP Code</label>
          <input type="text" id="totp" name="totp"
            class="w-full bg-gray-600 bg-opacity-20 focus:bg-transparent focus:ring-2 focus:ring-indigo-900
                   rounded border border-gray-600 focus:border-indigo-500 text-base outline-none text-gray-100
                   py-1 px-3 leading-8 transition-colors duration-200 ease-in-out">
        </div>
        <button class="text-white bg-indigo-500 border-0 py-2 px-8 focus:outline-none hover:bg-indigo-600 rounded text-lg">
          Verify
        </button>
      </form>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var uri = {{ uri|tojson|safe }};
    console.log("QR URI:", uri); 
    QRCode.toDataURL(uri, { width: 256, margin: 2 }, function (err, url) {
      if (err) {
        console.error("QR generation error:", err);
        return;
      }
      document.getElementById("qrcode").src = url;
    });
  });
</script>
{% endblock %}
